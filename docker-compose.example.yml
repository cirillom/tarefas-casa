# Referência para o servidor (~/services/tarefas-casa/docker-compose.yml).

services:
  tarefas-casa:
    image: ghcr.io/cirillom/tarefas-casa:latest
    container_name: tarefas-casa
    restart: always

    environment:
      - TZ=America/Sao_Paulo

    volumes:
      - /mnt/hdd/tarefas-casa/data:/data

    networks:
      - proxy

networks:
  proxy:
    external: true
